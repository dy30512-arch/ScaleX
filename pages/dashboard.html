<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>ScaleX | Dashboard</title>
</head>
<body class="bg-[#0F172A] text-white font-sans min-h-screen">

    <nav class="border-b border-white/10 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">ScaleX <span class="text-blue-500">Portal</span></h1>
            <div class="flex items-center gap-6">
                <span id="userEmail" class="text-gray-400 text-sm"></span>
                <button id="logoutBtn" class="text-red-400 hover:text-red-300 text-sm font-medium transition-all">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="adminSection" class="hidden">
            <h2 class="text-3xl font-bold mb-8">Inquiry <span class="text-blue-500">Leads</span></h2>
            <div class="overflow-x-auto bg-slate-900/50 rounded-3xl border border-white/10">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-gray-400 uppercase text-xs tracking-wider">
                        <tr>
                            <th class="px-6 py-4">Date</th>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Service</th>
                            <th class="px-6 py-4">Message</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTable" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="clientSection" class="hidden text-center py-20">
            <h2 class="text-4xl font-bold mb-4">Welcome to your <span class="text-purple-500">Project Hub</span></h2>
            <p class="text-gray-400 max-w-lg mx-auto">Your digital transformation is in progress. Check back soon for project updates and analytics.</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // *** PASTE YOUR FIREBASE KEYS HERE ***
        const firebaseConfig = {
            apiKey: "AIzaSyBH5AP4vEvjSh_Jo6z8tuesT8TRochWSvQ",
            authDomain: "scalex-1805c.firebaseapp.com",
            projectId: "scalex-1805c",
            storageBucket: "scalex-1805c.firebasestorage.app",
            messagingSenderId: "702635163606",
            appId: "1:702635163606:web:02b922ed1a7b97bb4f2e77"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Security Check: Is the user logged in?
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                
                // If it's you (Admin), load the leads
                if (user.email === "admin@scalex.buzz") {
                    document.getElementById('adminSection').classList.remove('hidden');
                    fetchLeads();
                } else {
                    // If it's a client, just show the welcome message
                    document.getElementById('clientSection').classList.remove('hidden');
                }
            } else {
                // If they aren't logged in, kick them back to the login page
                window.location.href = "login.html";
            }
        });

        // Function to grab leads from the database
        async function fetchLeads() {
            try {
                const q = query(collection(db, "leads"), orderBy("date", "desc"));
                const querySnapshot = await getDocs(q);
                const tableBody = document.getElementById('leadsTable');
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = `
                        <tr class="hover:bg-white/5 transition-all">
                            <td class="px-6 py-4 text-sm text-gray-500">${data.date ? data.date.toDate().toLocaleDateString() : 'New'}</td>
                            <td class="px-6 py-4 font-medium">${data.name} <br> <span class="text-xs text-blue-400">${data.email}</span></td>
                            <td class="px-6 py-4 text-sm text-gray-300">${data.service}</td>
                            <td class="px-6 py-4 text-sm text-gray-400">${data.message}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error fetching leads:", error);
            }
        }

        // Logout Button Logic
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });
    </script>
</body>
</html>

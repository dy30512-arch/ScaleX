<script type="module">
        // 1. Import Firebase Authentication tools
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 2. Your specific ScaleX Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBH5AP4vEvjSh_Jo6z8tuesT8TRochWSvQ",
            authDomain: "scalex-1805c.firebaseapp.com",
            projectId: "scalex-1805c",
            storageBucket: "scalex-1805c.firebasestorage.app",
            messagingSenderId: "702635163606",
            appId: "1:702635163606:web:02b922ed1a7b97bb4f2e77"
        };

        // 3. Initialize the connection to Google's servers
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 4. Handle the Login Submission
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            signInWithEmailAndPassword(auth, email, password)
              .then((userCredential) => {
                // SUCCESS! Send them directly to the dashboard
                window.location.href = "dashboard.html"; 
              })
              .catch((error) => {
                // If wrong password or email, show an alert
                alert("Login failed: " + error.message);
              });
        });
    </script>
